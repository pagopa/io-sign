name: PR - IO Sign ITN TF Validation

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "infra/italynorth/prod/**"
      - "infra/italynorth/_modules/**"
      - ".github/workflows/itn-tf-code-review.yaml"

jobs:
  prod_itn_core_code_review:
    uses: pagopa/dx/.github/workflows/infra_plan.yaml@main
    name: Prod - Code Review
    secrets: inherit
    with:
      environment: prod
      base_path: infra/italynorth
      override_github_environment: infra-prod
      use_private_agent: true
