name: PR - IO Sign ITN TF Apply

on: 
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "infra/italynorth/prod/**"
      - "infra/italynorth/_modules/**"
      - ".github/workflows/itn-tf-deploy.yaml"

jobs:
  prod_itn_core_deploy:
    uses: pagopa/dx/.github/workflows/infra_apply.yaml@main
    name: Prod - Code Deploy
    secrets: inherit
    with:
      environment: prod
      base_path: infra/italynorth
      override_github_environment: infra-prod
      use_private_agent: true
