name: 'io-sign-dev'

services:
  cosmos-db-internal:
    #preview version wich supports ARM
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview@sha256:a8b93e25520e999d867ed3949e7de7f4ff3ddab23ca95fa6f90230de5dd9729b
    mem_limit: 3G
    cpu_count: 2
    tty: true
    environment:
      - AZURE_COSMOS_EMULATOR_PARTITION_COUNT=3
      - AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE=true
      - COSMOSDB_EMULATOR_URI=http://cosmos-db:8081
      - COSMOSDB_EMULATOR_KEY='C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=='
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    ports:
      - 1234:1234

  cosmos-db:
    image: alpine:latest@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
    depends_on:
      - cosmos-db-internal
    ports:
      - 8081:8081
    command: >
      sh -c "apk add --no-cache socat openssl &&
             openssl req -x509 -newkey rsa:2048 -keyout /key.pem -out /cert.pem -days 365 -nodes -subj '/CN=cosmos-db' &&
             socat OPENSSL-LISTEN:8081,reuseaddr,fork,cert=/cert.pem,key=/key.pem,verify=0 TCP:cosmos-db-internal:8081"
  
  cosmos-db-setup:
    image: node:24-alpine@sha256:a0b9bf06e4e6193cf7a0f58816cc935ff8c2a908f81e6f1a95432d679c54fbfd
    working_dir: /app
    depends_on:
      - cosmos-db
    environment:
      - COSMOS_ENDPOINT=https://cosmos-db:8081
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    volumes:
      - ./setup-cosmos-containers.js:/app/setup-cosmos-containers.js
    command: sh -c "npm install @azure/cosmos && node setup-cosmos-containers.js"
      
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest@sha256:37493d0f2e764467421ffe16eb3caa39277e5fa7f6adea18eb5bbfb3c5247f98
    ports:
      - 10000:10000
      - 10001:10001
      - 10002:10002
    command: azurite --skipApiVersionCheck --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
  
  azurite-setup:
    image: node:24-alpine@sha256:a0b9bf06e4e6193cf7a0f58816cc935ff8c2a908f81e6f1a95432d679c54fbfd
    working_dir: /app
    depends_on:
      - azurite
    volumes:
      - ./setup-azurite-containers.js:/app/setup-azurite-containers.js
    command: sh -c "npm install @azure/storage-blob @azure/storage-queue @azure/data-tables && node setup-azurite-containers.js"

  eventhubs-internal:
    image: "mcr.microsoft.com/azure-messaging/eventhubs-emulator:latest@sha256:25ec4141efb69933a0c82e6a787fa147a3895519e7d236d4c41ba568e03100eb"
    depends_on:
      - "azurite"
    volumes:
      - "./eventhubs-emulator.json:/Eventhubs_Emulator/ConfigFiles/Config.json"
    environment:
      BLOB_SERVER: azurite
      METADATA_SERVER: azurite
      ACCEPT_EULA: Y

  eventhubs:
    image: alpine:latest@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
    depends_on:
      - eventhubs-internal
    ports:
      - "5671:5671"
      - "5672:5672"
      - "9092:9092"
      - "9093:9093"
    command: >
      sh -c "apk add --no-cache socat openssl &&
             openssl req -x509 -newkey rsa:2048 -keyout /key.pem -out /cert.pem -days 365 -nodes -subj '/CN=eventhubs' &&
             socat OPENSSL-LISTEN:5671,reuseaddr,fork,cert=/cert.pem,key=/key.pem,verify=0 TCP:eventhubs-internal:5672 &
             socat TCP-LISTEN:5672,reuseaddr,fork TCP:eventhubs-internal:5672 &
             socat TCP-LISTEN:9092,reuseaddr,fork TCP:eventhubs-internal:9092 &
             socat TCP-LISTEN:9093,reuseaddr,fork TCP:eventhubs-internal:9093 &
             wait"

  kafka-ui:
    image: "provectuslabs/kafka-ui:latest@sha256:8f2ff02d64b0a7a2b71b6b3b3148b85f66d00ec20ad40c30bdcd415d46d31818"
    depends_on:
      - "eventhubs"
    ports:
      - "8002:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "eventhubs:9092"
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: "SASL_PLAINTEXT"
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: "PLAIN"
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="$$ConnectionString" password="Endpoint=sb://eventhubs;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;";'

  mock-io-services:
    image: mock-io-services
    build:
      context: ./
      dockerfile: ./docker/mock/Dockerfile
      args:
        MOCK_NAME: "mock-io-services"
        NODE_VERSION: "24.17.0"
    ports:
      - "3011:3011"
    environment:
      - NODE_ENV=development

  mock-namirial:
    image: mock-namirial
    build:
      context: ./
      dockerfile: ./docker/mock/Dockerfile
      args:
        MOCK_NAME: "mock-namirial"
        NODE_VERSION: "24.17.0"
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=development

  mock-lollipop:
    image: mock-lollipop
    build:
      context: ./
      dockerfile: ./docker/mock/Dockerfile
      args:
        MOCK_NAME: "mock-lollipop"
        NODE_VERSION: "24.17.0"
    ports:
      - "3012:3012"
    environment:
      - NODE_ENV=development

  io-func-sign-issuer:
    image: io-func-sign-issuer
    build:
      context: ./
      dockerfile: ./docker/function/Dockerfile
      args:
        FUNCTION_NAME: "io-func-sign-issuer"
        NODE_VERSION: "24.17.0"
    env_file:
      - ./docker/generated/.env.io-func-sign-issuer
    ports:
      - ${FUNCTION_ISSUER_PORT}:7071
    depends_on:
      - azurite
      - cosmos-db
      - eventhubs
      - mock-io-services

  io-func-sign-support:
    image: io-func-sign-support
    build:
      context: ./
      dockerfile: ./docker/function/Dockerfile
      args:
        FUNCTION_NAME: "io-func-sign-support"
        NODE_VERSION: "24.17.0"
    env_file:
      - ./docker/generated/.env.io-func-sign-support
    ports:
      - ${FUNCTION_SUPPORT_PORT}:7071
    depends_on:
      - azurite
      - cosmos-db
      - eventhubs

  io-func-sign-user:
    image: io-func-sign-user
    build:
      context: ./
      dockerfile: ./docker/function/Dockerfile
      args:
        FUNCTION_NAME: "io-func-sign-user"
        NODE_VERSION: "24.17.0"
    env_file:
      - ./docker/generated/.env.io-func-sign-user
    ports:
      - ${FUNCTION_USER_PORT}:7071
    depends_on:
      - azurite
      - cosmos-db
      - eventhubs
      - mock-io-services
      - mock-namirial
      - mock-lollipop

  io-func-sign-user-legacy:
    image: io-func-sign-user-legacy
    build:
      context: ./
      dockerfile: ./docker/function/Dockerfile
      args:
        FUNCTION_NAME: "io-func-sign-user-legacy"
        NODE_VERSION: "24.17.0"
    env_file:
      - ./docker/generated/.env.io-func-sign-user-legacy
    ports:
      - ${FUNCTION_USER_LEGACY_PORT}:7071
    depends_on:
      - azurite
      - cosmos-db
      - eventhubs
      - mock-io-services
      - mock-namirial
      - mock-lollipop
  
  io-sign-backoffice-func:
    image: io-sign-backoffice-func
    build:
      context: ./
      dockerfile: ./docker/function/Dockerfile
      args:
        FUNCTION_NAME: "io-sign-backoffice-func"
        NODE_VERSION: "24.17.0"
    env_file:
      - ./docker/generated/.env.io-sign-backoffice-func
    ports:
      - ${FUNCTION_BACKOFFICE_FUNC_PORT}:7071
    depends_on:
      - azurite
      - cosmos-db
      - eventhubs

volumes:
  cosmos-db-volume: